# Paths (relative to project root directory)
paths:
  dataset_dir: "dataset"
  processed_dir: "processed"
  checkpoint_dir: "checkpoints"
  tokenizer_path: "tokenizer.json"
  output_dir: "output"

# Tokenizer Configuration (REMI)
tokenizer:
  pitch_range: [21, 109]            # Piano pitch range (A0 to C8)
  beat_res:
    "0,4": 8                        # 32nd note resolution (trills, mordents)
    "4,12": 4                       # 16th notes for regular beats
  num_velocities: 16                # Quantize velocity into 16 bins (dynamics)
  use_chords: true                  # Recognize chords
  use_rests: true                   # Represent rests explicitly
  rest_range: [0.25, 8.0]           # Minimum rest size is 1/4 beat, max is 8 beats
  beat_res_rest:
    "0,4": 8
    "4,12": 4
  use_tempos: true                  # Represent tempo changes
  use_time_signatures: true         # Enable 3/4, 6/8, 4/4 learning
  use_programs: true                # Identify different channels/instruments (tracks)

# Model Configuration (Custom LLaMA for Baroque Music)
model:
  vocab_size: null                  # Will be set dynamically based on tokenizer
  n_positions: 4096                 # Context window (sequence length)
  n_embd: 384                       # Hidden dimension
  intermediate_size: 1024           # FFN intermediate (SwiGLU)
  n_layer: 6                       # Transformer layers
  n_head: 6                        # Attention heads
  n_kv_head: 6                     # Key/value heads (no GQA)

# Training Configuration (Optimized for T4 VRAM)
training:
  batch_size: 4                     # Actual GPU micro-batch
  gradient_accumulation_steps: 8    # Effective batch = 32
  learning_rate: 0.0003             # Learning rate for cosine scheduler
  num_epochs: 25                    # Number of epochs with early stopping
  early_stopping_patience: 5          # Stop if val loss doesn't improve for N epochs
  weight_decay: 0.10                # Regularization
  save_steps: 500                   # Save checkpoint every N steps
  logging_steps: 50                 # Log every N steps
  seed: 42
  transposition_keys: [-2, 0, 2, -3, 5]  # 5 keys spanning the circle of fifths
  val_split: 0.1

# Inference Configuration
generate:
  max_length: 4096                  # Max tokens to generate
  temperature: 1                 # Higher sampling temperature for more varied output
  top_p: 0.9                        # Nucleus sampling threshold
  top_k: 15                         # Filter out low-probability tokens
  repetition_penalty: 1.15          # Repetition penalty to break note loops
  no_repeat_ngram_size: 8           # Block exact 8-gram repeats
  time_signature: "4/4"             # Default time signature for generation / ABA merge

